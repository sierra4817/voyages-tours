<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyages Tours | Planea tu Ruta</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-primary: #3b82f6;
            --blue-dark: #1e3a8a;
            --bg-light: #f8fafc;
            --navy-deep: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 500px;
            background: white;
            border: 2px solid var(--blue-primary);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            color: var(--blue-primary);
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        p {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* CONTADOR RESPONSIVO */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 35px;
        }

        .time-box {
            background-color: var(--navy-deep);
            color: white;
            padding: 15px 5px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-box span {
            font-size: 1.5rem;
            font-weight: 800;
            display: block;
        }

        .time-box label {
            font-size: 0.6rem;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* BOTÓN */
        .cta-button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transition: transform 0.2s ease;
        }

        .cta-button:active {
            transform: scale(0.98);
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        /* AJUSTES PARA MÓVILES MUY PEQUEÑOS */
        @media (max-width: 380px) {
            .time-box span { font-size: 1.2rem; }
            .time-box label { font-size: 0.5rem; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Planea tu próxima ruta</h1>
        
        <p>Utiliza el código <b>TT666</b> para un 10% de descuento en asesoría. La ventana cierra en:</p>

        <div class="countdown-container">
            <div class="time-box">
                <span id="days">01</span>
                <label>Días</label>
            </div>
            <div class="time-box">
                <span id="hours">06</span>
                <label>Horas</label>
            </div>
            <div class="time-box">
                <span id="minutes">59</span>
                <label>Mins</label>
            </div>
            <div class="time-box">
                <span id="seconds">47</span>
                <label>Segs</label>
            </div>
        </div>

        <a href="https://paa.ge/voyages.tours/en" class="cta-button">Ver disponibilidad ahora</a>

        <footer>
            Modo de aislamiento activado<br>
            <b>vt-as.com</b>
        </footer>
    </div>

    <script>
        // Configurar la fecha final (ejemplo: 2 días desde ahora)
        const countdownDate = new Date().getTime() + (1 * 24 * 60 * 60 * 1000 + 6 * 60 * 60 * 1000 + 59 * 60 * 1000);

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

            if (distance < 0) {
                clearInterval(x);
                document.querySelector(".countdown-container").innerHTML = "OFERTA EXPIRADA";
            }
        }, 1000);
    </script>

</body>
</html>
